<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TabTap — Split the bill, not the vibe</title>
  <meta name="description" content="TabTap is a mobile app for splitting restaurant bills. Snap the receipt, tap your items, send requests via Venmo, PayPal, Zelle, or Cash App. 50 cents." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@400;500&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #F8F6F1;
      color: #2C2825;
      font-family: 'DM Sans', system-ui, sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 64px 32px 80px;
      max-width: 600px;
    }

    .logo {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-size: 104px;
      letter-spacing: 0.01em;
      color: #2C2825;
      margin-bottom: 40px;
      user-select: none;
    }

    .tagline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: 22px;
      color: #8A837A;
      line-height: 1.45;
      min-height: 66px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #E8E3DB;
      margin: 44px 0;
    }

    .pitch {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 500;
      font-size: 20px;
      line-height: 1.65;
      color: #2C2825;
      max-width: 440px;
    }

    .pitch-secondary {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 400;
      font-size: 17px;
      line-height: 1.7;
      color: #2C2825;
      max-width: 420px;
      margin-top: 20px;
    }

    .divider-sm {
      width: 40px;
      height: 1px;
      background: #E8E3DB;
      margin: 36px 0;
    }

    .contact {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: #8A837A;
    }

    .contact a {
      color: #4682C3;
      text-decoration: none;
    }

    .contact a:hover {
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 24px;
      padding: 20px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    footer a {
      color: #B5AFA6;
      text-decoration: none;
      transition: color 0.15s;
    }

    footer a:hover {
      color: #2C2825;
    }

    @media (max-width: 480px) {
      .logo { font-size: 72px; margin-bottom: 32px; }
      .tagline { font-size: 19px; min-height: 56px; }
      .pitch { font-size: 18px; }
      .pitch-secondary { font-size: 15px; }
      .hero { padding: 48px 24px 72px; }
    }
  </style>
</head>
<body>

  <main class="hero">
    <div class="logo">tabtap</div>

    <div class="tagline" id="tagline">Be the hero of the table.</div>

    <div class="divider"></div>

    <p class="pitch">
      Snap. Tap. Split.<br />
      We’ll handle tax, tip, and payment requests.
    </p>

    <p class="pitch-secondary">
      No subscriptions. No data collection. No account signup.<br />
      Just one task made easy.
    </p>

    <div class="divider-sm"></div>

    <div class="contact">
      <a href="mailto:HelloTapTab@gmail.com">HelloTapTab@gmail.com</a>
    </div>
  </main>

  <footer>
    <a href="/privacy">Privacy</a>
    <a href="/terms">Terms</a>
  </footer>

  <script>
    (function () {
      var slogans = [
        'Be the hero of the table.',
        'Not all heroes wear capes, some use TabTap.',
        'Split the tab, not the vibe.',
        'Because math after margaritas is a bad idea.',
        'You brought the card. We\u2019ll sort the rest.',
        'Dinner with friends, minus the awkward part.',
        'Fifty cents. Zero drama.',
        'The receipt whisperer.'
      ];
      var i = 0;
      var el = document.getElementById('tagline');
      setInterval(function () {
        el.style.opacity = '0';
        setTimeout(function () {
          i = (i + 1) % slogans.length;
          el.textContent = slogans[i];
          el.style.opacity = '1';
        }, 700);
      }, 30000);
    })();
  </script>

</body>
</html>
